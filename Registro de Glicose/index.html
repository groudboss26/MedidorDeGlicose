<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de glicose</title>
    <link rel="stylesheet" href="./src/style/main.css">
    <script type="module" src="./app.js"></script>

</head>

<body>
    <div class="blood-drops" aria-hidden="true"></div>
    <main class="container">
        <section class="hero">
            <h2>Vamos começar a fazer a sua medição!?</h2>
            <button type="button" id="mostrar-formulario">Começar a medição</button>
        </section>

        <section id="secao-formulario" hidden>
            <form autocomplete="off" class="form">
                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" name="nome" id="nome" required>
                </div>


                <div class="form-group">
                    <label for="data">Data:</label>
                    <input type="date" name="data" id="data" required>
                </div>

                <div class="form-group">
                    <label for="medicao">Medição:</label>
                    <input type="number" name="medicao" id="medicao" required step="0.01" min="0">
                </div>

                <button type="submit">Salvar medição</button>
            </form>

            <div id="mostrar-status"></div>

            <button type="button" id="mostrar-registros">Mostrar registros</button>

            <button type="button" id="sair">sair</button>
        </section>

        <section id="mostrar-dados" hidden>
            <ul id="lista"></ul>
        </section>
    </main>
    <footer class="app-footer">
        <p class="assinatura">Guilherme . Registro de Glicose</p>
        <p class="copyright">
            ©<span id="ano-atual"></span> Todos os direitos reservados.
        </p>
        <p class="aviso">
            Aviso importante: este registro é apenas para acompanhamento pessoal e não subtitui orientação médica profssional.

        </p>
    </footer>
</body>

</html>
